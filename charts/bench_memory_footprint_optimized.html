<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Memory Benchmark Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <style> .container { display: flex; justify-content: center; align-items: center; } .item { margin: auto; } </style>
  </head>
  <body>
      <div class="container">
        <div class="item" id="chart" style="width: 1800px; height: 600px"></div>
      </div>
      
      <script type="text/javascript">
          var chart = echarts.init(document.getElementById('chart'));
          var option = {
  "title": [
    {
      "text": "Memory Footprint: bench_memory_footprint_optimized.html"
    }
  ],
  "tooltip": {},
  "legend": {
    "data": [
      {
        "name": "Alloc Bytes (MB)"
      },
      {
        "name": "Dealloc Bytes (MB)"
      },
      {
        "name": "Grow Bytes (MB)"
      }
    ]
  },
  "xAxis": {
    "type": "category",
    "data": [
      "EngineV3/NARROW",
      "EngineV4/NARROW",
      "EngineV3/WIDE",
      "EngineV4/WIDE"
    ]
  },
  "yAxis": {
    "type": "value",
    "name": "Memory (MB)"
  },
  "series": [
    {
      "type": "bar",
      "name": "Alloc Bytes (MB)",
      "data": [
        0.0018157958984375,
        0.0017852783203125,
        0.1308135986328125,
        0.12494659423828125
      ]
    },
    {
      "type": "bar",
      "name": "Dealloc Bytes (MB)",
      "data": [
        228.88201904296875,
        114.44107055664062,
        228.8843994140625,
        114.44113159179688
      ]
    },
    {
      "type": "bar",
      "name": "Grow Bytes (MB)",
      "data": [
        384.9996337890625,
        0.00384521484375,
        418.17681884765625,
        0.001220703125
      ]
    }
  ]
};
          chart.setOption(option);
      </script>
  </body>
</html>
