[workspace]
resolver = "3"
members = ["benchmarks", "shared"]

[workspace.dependencies]
divan = "0.1.21"
tokio = { version = "1.50", features = ["full"] }
rand = "0.10.0"
rand_distr = "0.6.0"

[profile.release]
debug = 2
strip = "none"
opt-level = 3
lto = false
codegen-units = 1
debug-assertions = false
overflow-checks = false
